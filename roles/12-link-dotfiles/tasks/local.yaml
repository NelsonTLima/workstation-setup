# vi: ft=yaml.ansible
---
- name: Ensure ~/.config directory exists
  become: true
  become_user: "{{ user.name }}"
  ansible.builtin.file:
    path: "{{ user.home }}/.config"
    state: directory
    owner: "{{ user.name }}"
    mode: "0770"
  loop: "{{ users }}"
  loop_control:
    loop_var: user


- name: Remove .config dirs
  become: true
  become_user: "{{ item.0.name }}"
  ansible.builtin.file:
    path: "{{ item.1 }}"
    state: absent
  vars:
    directories:
      - "~/.config/hypr"
      - "~/.config/waybar"
      - "~/.config/wofi"
      - "~/.config/nvim"
      - "~/.config/ghostty"
      - "~/Library/Application\ Support/com.mitchellh.ghostty/config"
  with_nested:
    - "{{ users }}"
    - "{{ directories }}"


- name: Create symlink for hyprland config
  become: true
  become_user: "{{ user.name }}"
  when: ansible_facts['os_family'] == 'Archlinux'
  ansible.builtin.file:
    src: "{{ playbook_dir }}/dotfiles/linux/hypr"
    dest: "~/.config/hypr"
    state: link
    force: true
  loop: "{{ users }}"
  loop_control:
    loop_var: user


- name: Create symlink for waybar config
  become: true
  become_user: "{{ user.name }}"
  when: ansible_facts['os_family'] == 'Archlinux'
  ansible.builtin.file:
    src: "{{ playbook_dir }}/dotfiles/linux/waybar"
    dest: "~/.config/waybar"
    state: link
    force: true
  loop: "{{ users }}"
  loop_control:
    loop_var: user


- name: Create symlink for wofi config
  become: true
  become_user: "{{ user.name }}"
  when: ansible_facts['os_family'] == 'Archlinux'
  ansible.builtin.file:
    src: "{{ playbook_dir }}/dotfiles/linux/wofi"
    dest: "~/.config/wofi"
    state: link
    force: true
  loop: "{{ users }}"
  loop_control:
    loop_var: user


- name: Create symlink for backgrounds
  when: ansible_facts['os_family'] == 'Archlinux'
  ansible.builtin.file:
    src: "{{ playbook_dir }}/dotfiles/shared/backgrounds"
    dest: "/usr/share/backgrounds/custom"
    state: link
    force: true


- name: Create symlink for Ghostty config
  when: >
    (
    ansible_facts['os_family'] == 'Debian'
    or ansible_facts['os_family'] == 'Archlinux'
    )
  become: true
  become_user: "{{ user.name }}"
  ansible.builtin.file:
    src: "{{ playbook_dir }}/dotfiles/shared/ghostty"
    dest: "~/.config/ghostty"
    state: link
    force: true
  loop: "{{ users }}"
  loop_control:
    loop_var: user


- name: Create symlink for Ghostty config (Macos)
  when: >
    (
    ansible_facts['os_family'] == 'Darwin'
    )
  become: true
  become_user: "{{ user.name }}"
  ansible.builtin.file:
    src: "{{ playbook_dir }}/dotfiles/shared/ghostty/config"
    dest: "~/Library/Application Support/com.mitchellh.ghostty/config"
    state: link
    force: true
  loop: "{{ users }}"
  loop_control:
    loop_var: user


- name: Create symlink for nvim config
  become: true
  become_user: "{{ user.name }}"
  ansible.builtin.file:
    src: "{{ playbook_dir }}/dotfiles/shared/nvim"
    dest: "~/.config/nvim"
    state: link
    force: true
  loop: "{{ users }}"
  loop_control:
    loop_var: user
